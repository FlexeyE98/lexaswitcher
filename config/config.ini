[general]
auto_fix=true
notifications=true
min_word_length=4
auto_fix_direction=en_to_ru
double_shift_switch=true
double_shift_window_ms=350

[hotkeys]
fix_last_word=^!Space
fix_selection=^!+Space
toggle_enabled=^!Pause
toggle_auto_fix=^!+Pause
reload_config=^!r

[apps]
excluded=Code.exe,WindowsTerminal.exe
